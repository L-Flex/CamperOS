<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CamperNode Einrichtung</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --accent: #3d9ee5;
      --accent-dim: #2a6fa3;
      --text: #e8eef4;
      --muted: #8b9cb3;
      --ok: #4caf7a;
      --warn: #e8a838;
      --danger: #e85d5d;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 8px;
    }
    header p { color: var(--muted); margin: 0; }
    .progress {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
    }
    .progress span {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #2a3544;
      transition: background 0.3s;
    }
    .progress span.done { background: var(--accent); }
    .progress span.active { background: var(--accent-dim); }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .card h2 {
      font-size: 1.25rem;
      margin: 0 0 12px;
    }
    .card p, .card li { color: var(--muted); }
    .card p strong, .card li strong { color: var(--text); }
    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 500;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #2a3544;
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    select:focus, input:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    .hint {
      font-size: 0.875rem;
      color: var(--warn);
      margin-top: 8px;
    }
    .nav {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #4aabf0; }
    .btn-secondary {
      background: #2a3544;
      color: var(--text);
    }
    .btn-secondary:hover { background: #354556; }
    .hidden { display: none !important; }
    .result-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      border-left: 4px solid var(--ok);
    }
    .result-box h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--ok);
    }
    .steps-list {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: step;
    }
    .steps-list li {
      counter-increment: step;
      padding: 10px 0 10px 36px;
      position: relative;
      border-bottom: 1px solid #2a3544;
    }
    .steps-list li:last-child { border-bottom: none; }
    .steps-list li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 10px;
      width: 24px;
      height: 24px;
      background: var(--accent-dim);
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .badge {
      display: inline-block;
      background: #2a3544;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--accent);
    }
    ol.simple { padding-left: 1.25rem; }
    ol.simple li { margin-bottom: 8px; color: var(--muted); }
    .print-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    @media print {
      body { background: #fff; color: #000; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .nav, .progress, .print-hint { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>CamperNode Einrichtung</h1>
      <p>Schritt für Schritt — ohne Programmieren, alles in Home Assistant</p>
    </header>

    <div class="progress" id="progress"></div>

    <div class="card" id="step-container"></div>
  </div>

  <script>
    const STRAPPING = [4, 5, 8, 9, 15];
    const STEPS = [
      { id: "welcome", title: "Willkommen" },
      { id: "ha-setup", title: "Home Assistant" },
      { id: "pair", title: "Verbinden" },
      { id: "profile", title: "Was steuerst du?" },
      { id: "pins", title: "Anschlüsse" },
      { id: "done", title: "Fertig" },
    ];

    const state = {
      step: 0,
      haQuirkDone: false,
      profile: "relay",
      buttonPin: "0",
      outputPin: "6",
      nodeName: "campernode",
    };

    function gpioOptions(includeNone) {
      let html = "";
      if (includeNone) {
        html += '<option value="0">Kein Taster (nur per App schalten)</option>';
      }
      for (let i = 0; i <= 23; i++) {
        const bad = STRAPPING.includes(i);
        const label = bad
          ? `GPIO ${i} — nicht verwenden (System-Pin)`
          : `GPIO ${i}`;
        html += `<option value="${i}"${bad ? " disabled" : ""}>${label}</option>`;
      }
      return html;
    }

    function renderProgress() {
      const el = document.getElementById("progress");
      el.innerHTML = STEPS.map((s, i) => {
        let cls = "";
        if (i < state.step) cls = "done";
        else if (i === state.step) cls = "active";
        return `<span class="${cls}" title="${s.title}"></span>`;
      }).join("");
    }

    function navButtons(showBack, nextLabel, onNext) {
      return `
        <div class="nav">
          ${showBack ? '<button type="button" class="btn-secondary" id="btn-back">Zurück</button>' : ""}
          <button type="button" class="btn-primary" id="btn-next">${nextLabel}</button>
        </div>`;
    }

    function profileLabel() {
      return state.profile === "pump" ? "Pumpe" : "Relais";
    }

    function profileEnum() {
      return state.profile === "pump" ? "pump" : "relay";
    }

    function switchLabel() {
      return state.profile === "pump" ? "Pumpe" : "Relais";
    }

    function renderStep() {
      renderProgress();
      const c = document.getElementById("step-container");
      const s = STEPS[state.step];

      if (s.id === "welcome") {
        c.innerHTML = `
          <h2>So einfach geht's</h2>
          <p>Du brauchst <strong>keinen Code</strong> und keine YAML-Dateien. Nach dem Einbinden in Home Assistant stellst du alles über normale Schieberegler und Auswahlfelder ein.</p>
          <ol class="simple">
            <li>Einmalig: kleine Erweiterung in Home Assistant kopieren (5 Minuten)</li>
            <li>CamperNode per Zigbee verbinden</li>
            <li>Profil, Taster-Pin und Ausgangs-Pin in der Geräte-Übersicht setzen</li>
          </ol>
          <p>Diese Anleitung merkt sich nichts — du kannst sie ausdrucken oder am Ende die Zusammenfassung fotografieren.</p>
          ${navButtons(false, "Los geht's", null)}
        `;
      }

      if (s.id === "ha-setup") {
        c.innerHTML = `
          <h2>Einmalige Einrichtung in Home Assistant</h2>
          <p>Das musst du nur <strong>einmal</strong> machen, damit Home Assistant die CamperNode-Einstellungen anzeigt.</p>
          <ol class="simple">
            <li>Ordner anlegen: <span class="badge">/config/custom_zha_quirks/</span></li>
            <li>Datei <span class="badge">campernode.py</span> aus dem CamperOS-Projekt dort hineinkopieren<br>
                <small>(Pfad im Projekt: integrations/homeassistant/zha/campernode.py)</small></li>
            <li>In <span class="badge">configuration.yaml</span> ergänzen:
              <pre style="background:#0f1419;padding:12px;border-radius:8px;overflow:auto;font-size:0.8rem;margin-top:8px">zha:
  enable_quirks: true
  custom_quirks_path: /config/custom_zha_quirks/</pre>
            </li>
            <li>Home Assistant <strong>neu starten</strong></li>
            <li>In den Logs nach „Loaded custom quirks" suchen (optional)</li>
          </ol>
          <label>
            <input type="checkbox" id="quirk-done" ${state.haQuirkDone ? "checked" : ""}>
            Das habe ich erledigt (oder war schon eingerichtet)
          </label>
          ${navButtons(true, "Weiter", null)}
        `;
      }

      if (s.id === "pair") {
        c.innerHTML = `
          <h2>CamperNode verbinden</h2>
          <ol class="simple">
            <li>Home Assistant → <strong>Einstellungen</strong> → <strong>Geräte &amp; Dienste</strong> → <strong>Zigbee</strong></li>
            <li><strong>Gerät hinzufügen</strong> → Netzwerk öffnen (Permit Join)</li>
            <li>CamperNode einschalten — er meldet sich von selbst</li>
            <li>Fertig, wenn ein Gerät <span class="badge">CamperNode OS</span> erscheint</li>
          </ol>
          <p>Ohne Quirk funktioniert der Schalter auf Endpoint 1 trotzdem. Für Profil und GPIO-Pins brauchst du die Quirk aus dem vorherigen Schritt.</p>
          ${navButtons(true, "Weiter", null)}
        `;
      }

      if (s.id === "profile") {
        c.innerHTML = `
          <h2>Was möchtest du steuern?</h2>
          <label for="profile">Profil</label>
          <select id="profile">
            <option value="relay" ${state.profile === "relay" ? "selected" : ""}>Relais (Licht, allgemeiner Schalter)</option>
            <option value="pump" ${state.profile === "pump" ? "selected" : ""}>Pumpe (Wasserpumpe, Ventil)</option>
          </select>
          <p class="hint">Nach dem Wechsel startet der Knoten neu. In Home Assistant unter dem Gerät <strong>Profil</strong> auswählen und speichern.</p>
          ${navButtons(true, "Weiter", null)}
        `;
      }

      if (s.id === "pins") {
        c.innerHTML = `
          <h2>Welche Kabel wo?</h2>
          <p>Trage die GPIO-Nummern ein, die du am ESP32-C6 angeschlossen hast. Unbekannt? Auf dem Board steht oft „GPIO10" o.ä.</p>
          <label for="button-pin">Taster (optional)</label>
          <select id="button-pin">${gpioOptions(true)}</select>
          <label for="output-pin">Relais / Pumpe (Ausgang)</label>
          <select id="output-pin">${gpioOptions(false)}</select>
          <p class="hint">Pins 4, 5, 8, 9 und 15 nicht benutzen — das sind reservierte System-Pins am ESP32-C6.</p>
          <label for="node-name">Name (optional)</label>
          <input type="text" id="node-name" placeholder="z.B. camper-pumpe" value="${state.nodeName}">
          ${navButtons(true, "Zusammenfassung", null)}
        `;
        document.getElementById("button-pin").value = state.buttonPin;
        document.getElementById("output-pin").value = state.outputPin;
      }

      if (s.id === "done") {
        const btnText = state.buttonPin === "0"
          ? "Kein Taster — nur per Home Assistant schalten"
          : `Taster-Pin = <strong>${state.buttonPin}</strong>`;
        c.innerHTML = `
          <h2>Fertig — so stellst du es in Home Assistant ein</h2>
          <div class="result-box">
            <h3>Deine Einstellungen</h3>
            <ul class="steps-list">
              <li>Gerät öffnen: <strong>CamperNode OS</strong></li>
              <li><strong>Profil</strong> → <span class="badge">${profileLabel()}</span> (${profileEnum()})</li>
              <li><strong>Taster-Pin</strong> → Zahl <strong>${state.buttonPin}</strong></li>
              <li><strong>Ausgangs-Pin</strong> → Zahl <strong>${state.outputPin}</strong></li>
              <li>Schalter testen: <strong>${switchLabel()}</strong> ein/aus</li>
            </ul>
          </div>
          <p>${btnText}</p>
          <p>Die Werte einfach in den Entitäten des Geräts eintragen — wie bei einem Thermostat die Temperatur. Kein YAML, kein Terminal.</p>
          <p><strong>Neustart</strong>-Button am Gerät nur nach Profilwechsel nötig (passiert oft automatisch).</p>
          <div class="nav">
            <button type="button" class="btn-secondary" id="btn-back">Zurück</button>
            <button type="button" class="btn-primary" id="btn-print">Anleitung drucken</button>
          </div>
          <p class="print-hint">Tipp: Screenshot oder Ausdruck mitnehmen zur Verkabelung.</p>
        `;
      }

      bindNav();
    }

    function bindNav() {
      const back = document.getElementById("btn-back");
      const next = document.getElementById("btn-next");
      const printBtn = document.getElementById("btn-print");

      if (back) {
        back.onclick = () => {
          saveCurrentStep();
          state.step = Math.max(0, state.step - 1);
          renderStep();
        };
      }
      if (next) {
        next.onclick = () => {
          if (!saveCurrentStep()) return;
          state.step = Math.min(STEPS.length - 1, state.step + 1);
          renderStep();
        };
      }
      if (printBtn) {
        printBtn.onclick = () => window.print();
      }
    }

    function saveCurrentStep() {
      const s = STEPS[state.step];
      if (s.id === "ha-setup") {
        const cb = document.getElementById("quirk-done");
        state.haQuirkDone = cb && cb.checked;
        if (!state.haQuirkDone) {
          const ok = confirm(
            "Ohne die Quirk-Erweiterung siehst du in Home Assistant keine Felder für Profil und GPIO-Pins.\n\nTrotzdem weiter?"
          );
          if (!ok) return false;
        }
      }
      if (s.id === "profile") {
        state.profile = document.getElementById("profile").value;
      }
      if (s.id === "pins") {
        state.buttonPin = document.getElementById("button-pin").value;
        state.outputPin = document.getElementById("output-pin").value;
        state.nodeName = document.getElementById("node-name").value.trim() || "campernode";
        if (STRAPPING.includes(Number(state.outputPin))) {
          alert("Der Ausgangs-Pin darf kein System-Pin (4, 5, 8, 9, 15) sein.");
          return false;
        }
        if (state.buttonPin !== "0" && STRAPPING.includes(Number(state.buttonPin))) {
          alert("Der Taster-Pin darf kein System-Pin sein.");
          return false;
        }
      }
      return true;
    }

    renderStep();
  </script>
</body>
</html>
