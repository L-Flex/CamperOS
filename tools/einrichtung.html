<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CamperNode Einrichtung</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --accent: #3d9ee5;
      --accent-dim: #2a6fa3;
      --text: #e8eef4;
      --muted: #8b9cb3;
      --ok: #4caf7a;
      --warn: #e8a838;
      --danger: #e85d5d;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 1.75rem; font-weight: 600; margin: 0 0 8px; }
    header p { color: var(--muted); margin: 0; }
    .progress { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
    .progress span {
      flex: 1;
      min-width: 24px;
      height: 4px;
      border-radius: 2px;
      background: #2a3544;
      transition: background 0.3s;
    }
    .progress span.done { background: var(--accent); }
    .progress span.active { background: var(--accent-dim); }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .card h2 { font-size: 1.25rem; margin: 0 0 12px; }
    .card h3 { font-size: 1rem; margin: 20px 0 8px; color: var(--accent); }
    .card p, .card li { color: var(--muted); }
    .card p strong, .card li strong { color: var(--text); }
    label { display: block; margin: 16px 0 6px; font-weight: 500; }
    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #2a3544;
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    select:focus, input:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    .hint { font-size: 0.875rem; color: var(--warn); margin-top: 8px; }
    .ok-hint { font-size: 0.875rem; color: var(--ok); margin-top: 8px; }
    .nav { display: flex; gap: 12px; margin-top: 24px; }
    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4aabf0; }
    .btn-secondary { background: #2a3544; color: var(--text); }
    .badge {
      display: inline-block;
      background: #2a3544;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--accent);
      word-break: break-all;
    }
    ol.simple, ul.simple { padding-left: 1.25rem; }
    ol.simple li, ul.simple li { margin-bottom: 10px; color: var(--muted); }
    pre {
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      font-size: 0.8rem;
      margin: 8px 0;
      border: 1px solid #2a3544;
    }
    code { color: var(--accent); font-size: 0.9em; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.95rem; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #2a3544; }
    th { color: var(--text); }
    .result-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      border-left: 4px solid var(--ok);
    }
    .result-box h3 { margin: 0 0 12px; font-size: 1rem; color: var(--ok); }
    .when-table td:first-child { font-weight: 600; color: var(--text); white-space: nowrap; }
    .steps-list {
      list-style: none; padding: 0; margin: 0; counter-reset: step;
    }
    .steps-list li {
      counter-increment: step;
      padding: 10px 0 10px 36px;
      position: relative;
      border-bottom: 1px solid #2a3544;
      color: var(--muted);
    }
    .steps-list li:last-child { border-bottom: none; }
    .steps-list li::before {
      content: counter(step);
      position: absolute; left: 0; top: 10px;
      width: 24px; height: 24px;
      background: var(--accent-dim);
      border-radius: 50%;
      font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .tag-restart { color: var(--warn); font-weight: 600; }
    .tag-pair { color: var(--accent); font-weight: 600; }
    .hidden { display: none !important; }
    .print-hint { text-align: center; margin-top: 16px; font-size: 0.875rem; color: var(--muted); }
    @media print {
      body { background: #fff; color: #000; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .nav, .progress, .print-hint { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>CamperNode Einrichtung</h1>
      <p>Schritt für Schritt — ein ESP32 in Home Assistant (ZHA)</p>
    </header>
    <div class="progress" id="progress"></div>
    <div class="card" id="step-container"></div>
  </div>

  <script>
    const RESERVED = [0, 6, 7, 8, 9, 16, 17];
    const BOOT_GPIO = 9;
    const LED_GPIO = 8;
    const STRAPPING = [4, 5, 8, 9, 15];

    const STEPS = [
      { id: "welcome", title: "Start" },
      { id: "ha-files", title: "Dateien" },
      { id: "ha-start", title: "HA Start" },
      { id: "firmware", title: "Firmware" },
      { id: "pair", title: "Koppeln" },
      { id: "pins", title: "GPIO-Karte" },
      { id: "apply", title: "In HA" },
      { id: "done", title: "Fertig" },
    ];

    const ASSIGNABLE_PINS = [];
    for (let i = 0; i <= 23; i++) {
      if (RESERVED.includes(i)) continue;
      if (STRAPPING.includes(i)) continue;
      ASSIGNABLE_PINS.push(i);
    }

    const state = {
      step: 0,
      filesDone: false,
      integrationDone: false,
      firmwareDone: false,
      pinRoles: { 3: "O" },
      pinMap: "3:O",
      nodeName: "campernode",
    };

    function roleOptions(selected) {
      return [
        ["", "— nicht verwendet"],
        ["I", "Eingang (Taster/Sensor)"],
        ["O", "Ausgang (Relais/LED)"],
        ["Od", "Ausgang MOSFET (Open-Drain, ab v0.2.0)"],
      ].map(([v, l]) =>
        `<option value="${v}"${v === selected ? " selected" : ""}>${l}</option>`
      ).join("");
    }

    function buildPinMapFromRoles(roles) {
      const parts = [];
      for (const pin of ASSIGNABLE_PINS) {
        const role = roles[pin];
        if (role === "O" || role === "Od" || role === "I") parts.push(`${pin}:${role}`);
      }
      return parts.join(",");
    }

    function renderProgress() {
      document.getElementById("progress").innerHTML = STEPS.map((s, i) => {
        let cls = i < state.step ? "done" : i === state.step ? "active" : "";
        return `<span class="${cls}" title="${s.title}"></span>`;
      }).join("");
    }

    function navButtons(showBack, nextLabel) {
      return `
        <div class="nav">
          ${showBack ? '<button type="button" class="btn-secondary" id="btn-back">Zurück</button>' : ""}
          <button type="button" class="btn-primary" id="btn-next">${nextLabel}</button>
        </div>`;
    }

    function whenTable() {
      return `
        <table class="when-table">
          <thead><tr><th>Aktion</th><th>Wann?</th></tr></thead>
          <tbody>
            <tr><td>Home Assistant <span class="tag-restart">neu starten</span></td><td>Nach dem Kopieren von Quirk + Integration (einmalig pro HA)</td></tr>
            <tr><td>ZHA <span class="tag-pair">Gerät hinzufügen</span></td><td>Pro neuem ESP32 einmal (Permit Join → einschalten)</td></tr>
            <tr><td><strong>GPIO-Karte</strong> speichern</td><td>Auf der Geräteseite — Textfeld „GPIO-Karte"</td></tr>
            <tr><td>ESP <span class="tag-restart">Neustart</span></td><td>Automatisch ~2 s nach dem Speichern der GPIO-Karte</td></tr>
            <tr><td><strong>Neu konfigurieren</strong></td><td>Am CamperNode-Gerät (Zahnrad) — ca. 30 s nach GPIO-Karte, damit Schalter erscheinen</td></tr>
            <tr><td>Erneut koppeln</td><td>Nur wenn Schalter fehlen trotz „Neu konfigurieren" — sonst nicht nötig</td></tr>
            <tr><td>Firmware flashen (USB)</td><td>Neues Board: <strong>0.2.0</strong> direkt per USB — oder einmalig 0.1.1 OTA-Basis, dann 0.2.0 per Zigbee-OTA</td></tr>
            <tr><td><strong>OTA Update</strong> (0.1.1 → 0.2.0)</td><td>OTA-Datei in <code>/config/zha_ota/</code>, HA-YAML mit <code>advanced</code>-Provider, HA neu starten, dann „Trigger OTA" in ZHA</td></tr>
          </tbody>
        </table>`;
    }

    function renderStep() {
      renderProgress();
      const c = document.getElementById("step-container");
      const s = STEPS[state.step];

      if (s.id === "welcome") {
        c.innerHTML = `
          <h2>Überblick</h2>
          <p>Du richtest <strong>einen ESP32 CamperNode</strong> in Home Assistant ein. Kein YAML für die GPIO-Karte, kein Entwicklerwerkzeug.</p>
          <ol class="simple">
            <li><strong>Einmalig (Home Assistant):</strong> Quirk + Integration kopieren → HA neu starten</li>
            <li><strong>Pro ESP32:</strong> koppeln → GPIO-Karte eintragen → kurz warten → „Neu konfigurieren"</li>
          </ol>
          <p>Mehrere ESP32? Schritte 4–7 für <strong>jeden</strong> Node wiederholen — jeder bekommt seine eigene GPIO-Karte.</p>
          ${whenTable()}
          ${navButtons(false, "Los geht's")}
        `;
      }

      if (s.id === "ha-files") {
        c.innerHTML = `
          <h2>Schritt 1 — Dateien in Home Assistant kopieren</h2>
          <p>Einmalig auf dem Home-Assistant-Server (z. B. per Samba, File Editor oder Studio Code Server).</p>

          <h3>A) ZHA-Quirk</h3>
          <ol class="simple">
            <li>Ordner anlegen: <span class="badge">/config/custom_zha_quirks/</span></li>
            <li>Datei kopieren:<br>
              <span class="badge">integrations/homeassistant/zha/campernode.py</span><br>
              → <span class="badge">/config/custom_zha_quirks/campernode.py</span></li>
          </ol>

          <h3>B) GPIO-Karte-Integration</h3>
          <ol class="simple">
            <li>Gesamten Ordner kopieren:<br>
              <span class="badge">integrations/homeassistant/campernode_config/</span><br>
              → <span class="badge">/config/custom_components/campernode_config/</span></li>
            <li>Enthalten sein müssen u. a.: <code>__init__.py</code>, <code>text.py</code>, <code>pin_map.py</code>, <code>config_flow.py</code>, <code>manifest.json</code>, Ordner <code>translations/</code></li>
            <li><strong>Nicht</strong> kopieren: <code>__pycache__</code></li>
          </ol>

          <h3>C) configuration.yaml</h3>
          <p>Quirk-Pfad — <strong>kein</strong> <code>campernode_config:</code> Eintrag!</p>
          <pre>zha:
  enable_quirks: true
  custom_quirks_path: /config/custom_zha_quirks/
  zigpy_config:
    ota:
      extra_providers:
        - type: zigpy_remote
          url: https://raw.githubusercontent.com/L-Flex/CamperOS/main/firmware/ota-index.json
          manufacturer_ids: [0x147B]
        - type: advanced
          path: /config/zha_ota
          warning: >-
            I understand I can *destroy* my devices by enabling OTA updates from files.
            Some OTA updates can be mistakenly applied to the wrong device, breaking it.
            I am consciously using this at my own risk.</pre>
          <p class="hint"><code>custom_quirks_path</code> ist Pflicht für CamperNode in ZHA. OTA: GitHub (<code>zigpy_remote</code>) und/oder lokal (<code>advanced</code>).</p>
          <h3>D) OTA-Datei (optional, nur lokal)</h3>
          <ol class="simple">
            <li>Ordner anlegen: <span class="badge">/config/zha_ota/</span></li>
            <li>Datei kopieren: <span class="badge">build/147b-c602-00000200-campernode.ota</span></li>
            <li>Home Assistant neu starten</li>
          </ol>

          <label>
            <input type="checkbox" id="files-done" ${state.filesDone ? "checked" : ""}>
            Dateien sind kopiert
          </label>
          ${navButtons(true, "Weiter")}
        `;
      }

      if (s.id === "ha-start") {
        c.innerHTML = `
          <h2>Schritt 2 — Home Assistant starten & Integration</h2>
          <ol class="simple">
            <li><strong>Home Assistant vollständig neu starten</strong> (Einstellungen → System → Neustart)</li>
            <li><strong>Einstellungen → Geräte & Dienste → Integration hinzufügen</strong></li>
            <li><strong>„CamperNode Config"</strong> suchen und hinzufügen<br>
              <small>(Melding „single_instance_allowed" = schon installiert — OK)</small></li>
            <li>Prüfen: Unter Geräte & Dienste erscheint <span class="badge">CamperNode Config</span></li>
          </ol>
          <p class="hint">Falls „CamperNode Config" fehlt: Logs prüfen (fehlende Datei / Syntaxfehler). <code>pin_map.py</code> muss vollständig sein.</p>
          <label>
            <input type="checkbox" id="integration-done" ${state.integrationDone ? "checked" : ""}>
            HA neu gestartet und CamperNode Config aktiv
          </label>
          ${navButtons(true, "Weiter")}
        `;
      }

      if (s.id === "firmware") {
        c.innerHTML = `
          <h2>Schritt 3 — Firmware auf dem ESP32 (v0.2.0)</h2>
          <p><strong>Empfohlen (neues Board):</strong> 0.2.0 direkt per USB flashen — kein OTA nötig.</p>
          <ol class="simple">
            <li>Im Projektordner: <code>idf.py build</code> und <code>idf.py -p COMx flash</code></li>
            <li>Seriell prüfen: <code>CamperNode OS v0.2.0 booting</code></li>
            <li>Enthält: GPIO-Karte, DHT22/DS18B20, MOSFET <code>:Od</code>, Zigbee-OTA-Client</li>
          </ol>
          <h3>Alternative: OTA-Weg (0.1.1 → 0.2.0)</h3>
          <ol class="simple">
            <li>Einmalig USB: OTA-Basis <strong>0.1.1</strong> flashen (<code>sdkconfig.defaults.ota-base</code>)</li>
            <li>OTA-Datei + HA-YAML wie in Schritt 1 (Abschnitt D)</li>
            <li>In ZHA: Button <strong>Trigger OTA</strong> — danach <code>v0.2.0 booting</code></li>
          </ol>
          <p class="ok-hint">Nach dem Flashen: ESP neu starten lassen, dann mit Schritt „Koppeln" weitermachen.</p>
          <label>
            <input type="checkbox" id="firmware-done" ${state.firmwareDone ? "checked" : ""}>
            Firmware ist aktuell / übersprungen
          </label>
          ${navButtons(true, "Weiter")}
        `;
      }

      if (s.id === "pair") {
        c.innerHTML = `
          <h2>Schritt 4 — ESP32 in ZHA koppeln</h2>
          <p>Pro neuem ESP32 einmal:</p>
          <ol class="simple">
            <li><strong>Einstellungen → Geräte & Dienste → Zigbee Home Automation</strong></li>
            <li><strong>Gerät hinzufügen</strong> → Zigbee-Netzwerk öffnen (Permit Join)</li>
            <li>CamperNode einschalten — er joint automatisch (Network Steering)</li>
            <li>Warten, bis <span class="badge">CamperNode OS</span> (Hersteller CamperOS) erscheint</li>
          </ol>
          <p>Jetzt siehst du u. a. <strong>Restart</strong>, <strong>Trigger OTA</strong>, <strong>Log level</strong>, <strong>GPIO 6/7 sensor</strong> — noch <em>keine</em> GPIO-Schalter (GPIO-Karte fehlt noch).</p>
          <p class="hint">Optional: Gerätenamen in ZHA ändern (z. B. „Relais Dachzelt").</p>
          ${navButtons(true, "GPIO-Karte planen")}
        `;
      }

      if (s.id === "pins") {
        const rows = ASSIGNABLE_PINS.map(pin => `
          <tr>
            <td>GPIO ${pin}</td>
            <td><select class="pin-role" data-pin="${pin}">${roleOptions(state.pinRoles[pin] || "")}</select></td>
          </tr>`).join("");
        c.innerHTML = `
          <h2>Schritt 5 — GPIO-Karte planen</h2>
          <p>Wähle pro Pin <strong>einmal</strong> die Funktion. Logik (Relais bei Taster usw.) machst du in Home Assistant — nicht im ESP.</p>
          <table>
            <thead><tr><th>Pin</th><th>Funktion</th></tr></thead>
            <tbody>
              <tr><td>GPIO 0</td><td><em>Reserviert — nicht verwenden</em></td></tr>
              <tr><td>GPIO ${BOOT_GPIO}</td><td><em>BOOT-Taster — <strong>immer Eingang</strong>, nicht in Karte eintragen</em></td></tr>
              <tr><td>GPIO ${LED_GPIO}</td><td><em>Status-LED — reserviert</em></td></tr>
              <tr><td>GPIO 6</td><td><em>Sensor optional (DS18B20/DHT22) — in HA: „GPIO 6 sensor"</em></td></tr>
              <tr><td>GPIO 7</td><td><em>Sensor optional (DS18B20/DHT22) — in HA: „GPIO 7 sensor"</em></td></tr>
              <tr><td>GPIO 16</td><td><em>UART-Konsole (Monitor) — reserviert</em></td></tr>
              <tr><td>GPIO 17</td><td><em>UART-Konsole (Monitor) — reserviert</em></td></tr>
              ${rows}
            </tbody>
          </table>
          <p><strong>Format:</strong> <code>3:O</code> = Relais, <code>5:Od</code> = MOSFET (Open-Drain, ab <strong>v0.2.0</strong>), <code>10:I</code> = Eingang</p>
          <label for="node-name">Gerätename (Merkhilfe, optional)</label>
          <input type="text" id="node-name" placeholder="z.B. camper-küche" value="${state.nodeName}">
          ${navButtons(true, "Weiter")}
        `;
      }

      if (s.id === "apply") {
        c.innerHTML = `
          <h2>Schritt 6 — GPIO-Karte in Home Assistant eintragen</h2>
          <ol class="simple">
            <li>Gerät <strong>CamperNode OS</strong> öffnen (dein gekoppelter ESP)</li>
            <li>Unter <strong>Konfiguration</strong> → Entität <strong>GPIO-Karte</strong></li>
            <li>Exakt diesen Text einfügen und speichern:<br>
              <pre id="copy-map">${state.pinMap || "(leer — zurück zu Schritt 5)"}</pre></li>
            <li>ESP startet nach ~2 Sekunden automatisch neu</li>
            <li><strong>30–60 Sekunden warten</strong> bis der Node wieder online ist</li>
            <li>Am CamperNode-Gerät: <strong>Neu konfigurieren</strong> (Zahnrad-Button) klicken</li>
            <li>Geräteseite neu laden — Schalter und Eingänge prüfen</li>
          </ol>
          <p class="hint">GPIO-Karte nochmal speichern löst ebenfalls eine automatische Entitäten-Aktualisierung aus.</p>
          ${navButtons(true, "Zusammenfassung")}
        `;
      }

      if (s.id === "done") {
        const outs = Object.entries(state.pinRoles).filter(([, r]) => r === "O" || r === "Od").map(([p]) => `GPIO ${p}${state.pinRoles[p] === "Od" ? " (MOSFET)" : ""}`);
        const ins = Object.entries(state.pinRoles).filter(([, r]) => r === "I").map(([p]) => `GPIO ${p}`);
        c.innerHTML = `
          <h2>Fertig — Zusammenfassung</h2>
          <div class="result-box">
            <h3>Dein ESP: ${state.nodeName}</h3>
            <ul class="steps-list">
              <li><strong>GPIO-Karte:</strong> <code>${state.pinMap}</code></li>
              <li><strong>Schalter (Ausgänge):</strong> ${outs.length ? outs.join(", ") : "—"}</li>
              <li><strong>Eingänge in Karte:</strong> ${ins.length ? ins.join(", ") : "—"}</li>
              <li><strong>Immer sichtbar:</strong> GPIO 9 BOOT (Eingang)</li>
            </ul>
          </div>

          <h3>Wann was tun?</h3>
          ${whenTable()}

          <h3>Checkliste „Funktioniert alles?"</h3>
          <ul class="simple">
            <li>GPIO-Karte auf Geräteseite sichtbar und gespeichert?</li>
            <li>Schalter <code>GPIO …</code> für jeden <code>:O</code>- und <code>:Od</code>-Pin?</li>
            <li>Binary Sensor <code>GPIO 9 BOOT</code> + je <code>:I</code>-Pin?</li>
            <li>Eingänge <strong>off</strong> wenn nicht gedrückt? (sonst: Firmware flashen)</li>
            <li>Relais testweise ein-/ausschalten</li>
          </ul>

          <h3>Mehrere ESP32</h3>
          <p>Schritte 4–6 für jeden weiteren Node wiederholen. HA-Einrichtung (Schritte 1–2) nur einmal.</p>

          <div class="nav">
            <button type="button" class="btn-secondary" id="btn-back">Zurück</button>
            <button type="button" class="btn-primary" id="btn-print">Ausdrucken / PDF</button>
          </div>
          <p class="print-hint">Screenshot oder Ausdruck für die Verkabelung mitnehmen.</p>
        `;
      }

      bindNav();
    }

    function bindNav() {
      const back = document.getElementById("btn-back");
      const next = document.getElementById("btn-next");
      const printBtn = document.getElementById("btn-print");
      if (back) back.onclick = () => { if (saveCurrentStep()) { state.step--; renderStep(); } };
      if (next) next.onclick = () => { if (saveCurrentStep()) { state.step++; renderStep(); } };
      if (printBtn) printBtn.onclick = () => window.print();
    }

    function saveCurrentStep() {
      const s = STEPS[state.step];
      if (s.id === "ha-files") {
        state.filesDone = !!document.getElementById("files-done")?.checked;
        if (!state.filesDone && !confirm("Ohne kopierte Dateien funktioniert die GPIO-Karte nicht. Trotzdem weiter?")) return false;
      }
      if (s.id === "ha-start") {
        state.integrationDone = !!document.getElementById("integration-done")?.checked;
      }
      if (s.id === "firmware") {
        state.firmwareDone = !!document.getElementById("firmware-done")?.checked;
      }
      if (s.id === "pins") {
        state.pinRoles = {};
        document.querySelectorAll(".pin-role").forEach(sel => {
          const pin = Number(sel.dataset.pin);
          if (sel.value) state.pinRoles[pin] = sel.value;
        });
        state.pinMap = buildPinMapFromRoles(state.pinRoles);
        state.nodeName = document.getElementById("node-name").value.trim() || "campernode";
        const outs = Object.values(state.pinRoles).filter(r => r === "O" || r === "Od").length;
        if (outs === 0) {
          alert("Mindestens einen Pin als Ausgang wählen.");
          return false;
